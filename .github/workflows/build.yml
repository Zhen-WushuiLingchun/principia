name: Build
on:
  workflow_dispatch:
    inputs:
      release_tag:
        required: true
        type: string
      primary_version:
        required: true
        type: string
      is_test_mode:
        required: false
        default: false
        type: boolean

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux
          - os: ubuntu-latest
            platform: linux
            arch: x64
          - os: ubuntu-latest
            platform: linux
            arch: arm64
          # macOS
          - os: macos-13
            platform: macos
            arch: x64
          - os: macos-13
            platform: macos
            arch: arm64
          # Windows
          - os: windows-latest
            platform: windows
            arch: x64
          - os: windows-latest
            platform: windows
            arch: x86
          - os: windows-latest
            platform: windows
            arch: arm64

    steps:
      - uses: actions/checkout@v4

      # 修复核心：先初始化Docker环境（基础镜像无docker，需先安装）
      - name: 初始化Docker环境（用于QEMU模拟ARM64）
        if: matrix.arch == 'arm64'
        uses: docker/setup-buildx-action@v3

      # 再安装QEMU模拟器（依赖Docker，现在可正常执行）
      - name: 安装QEMU多架构模拟器
        if: matrix.arch == 'arm64'
        uses: docker/setup-qemu-action@v3
        with:
          platforms: linux/arm64,windows/arm64,darwin/arm64

      # ==========================
      # Python 环境配置
      # ==========================
      - name: 设置 Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          architecture: ${{ matrix.arch == 'x86' && 'x86' || 'x64' }}

      - name: 安装 Python 依赖
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          cd principia
          pip install -r requirements.txt
        shell: bash

      # ==========================
      # 按架构打包Python后端
      # ==========================
      - name: 构建 Python 后端
        run: |
          cd principia
          if [ "${{ matrix.arch }}" = "arm64" ]; then
            qemu-aarch64 python -m PyInstaller --onefile --name app app.py --distpath electron
          else
            pyinstaller --onefile --name app app.py --distpath electron
          fi
        shell: bash

      # ==========================
      # Node.js + Electron 环境
      # ==========================
      - name: 设置 Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 安装 Node 依赖
        run: cd principia && npm install
        shell: bash

      - name: 统一应用版本号
        run: |
          cd principia
          node -e "const fs=require('fs');const p=JSON.parse(fs.readFileSync('package.json'));p.version='${{ inputs.primary_version }}';fs.writeFileSync('package.json',JSON.stringify(p,null,2));"
        shell: bash

      # ==========================
      # 构建前端 + Electron 应用
      # ==========================
      - name: 构建前端静态资源
        run: cd principia && npm run build
        shell: bash

      - name: 按架构构建 Electron 应用
        run: |
          cd principia
          if [ "${{ matrix.platform }}" = "windows" ]; then
            if [ "${{ matrix.arch }}" = "x86" ]; then
              npm run electron:build -- --ia32
            elif [ "${{ matrix.arch }}" = "arm64" ]; then
              npm run electron:build -- --arm64
            else
              npm run electron:build -- --x64
            fi
          else
            npm run electron:build -- --${{ matrix.arch }}
          fi
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ==========================
      # 上传1：未打包解压文件夹（调试用）
      # ==========================
      - name: 上传解压文件夹
        uses: actions/upload-artifact@v4
        with:
          name: principia-${{ inputs.primary_version }}-${{ matrix.platform }}-${{ matrix.arch }}-unpacked
          path: principia/dist-electron/*-unpacked/
          if-no-files-found: warn

      # ==========================
      # 上传2：可执行安装包（发布用）
      # ==========================
      - name: 上传可执行文件/安装包
        uses: actions/upload-artifact@v4
        with:
          name: principia-${{ inputs.primary_version }}-${{ matrix.platform }}-${{ matrix.arch }}-executable
          path: |
            principia/dist-electron/*.exe
            principia/dist-electron/*.AppImage
            principia/dist-electron/*.dmg
            principia/dist-electron/*.app
            !principia/dist-electron/*-unpacked/
            !principia/dist-electron/*.yml
            !principia/dist-electron/*.blockmap
            !principia/dist-electron/*.deb
            !principia/dist-electron/*.pkg
          if-no-files-found: warn