name: Build and Test

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller
        cd principia
        pip install -r requirements.txt

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        cd principia
        pip install -r requirements.txt

    - name: Build backend
      run: |
        cd principia
        pyinstaller --onefile --name app app.py --distpath electron
      shell: bash

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install Node.js dependencies
      run: |
        cd principia
        npm install

    - name: Build frontend
      run: |
        cd principia
        npm run build

    - name: Build Electron app
      run: |
        cd principia
        npm run electron:build
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Upload unpacked folder artifact
      uses: actions/upload-artifact@v4
      with:
        name: principia-${{ matrix.os }}-unpacked
        path: |
          principia/dist-electron/*-unpacked/
        # 保留文件夹结构，避免解压后丢失层级
        if-no-files-found: warn

    # 第二个上传步骤：上传对应系统的可执行文件（排除unpacked和其他冗余文件）
    - name: Upload executable file artifact
      uses: actions/upload-artifact@v4
      with:
        name: principia-${{ matrix.os }}-executable
        path: |
          # Windows 可执行文件
          principia/dist-electron/Principia *.exe
          # Linux AppImage
          principia/dist-electron/Principia-*.AppImage
          # macOS 镜像/应用包
          principia/dist-electron/Principia-*.dmg
          principia/dist-electron/Principia.app
          # 排除不需要的文件
          !principia/dist-electron/*-unpacked/
          !principia/dist-electron/*.yml
          !principia/dist-electron/*.blockmap
          !principia/dist-electron/Principia Setup *.exe
          !principia/dist-electron/*.deb
          !principia/dist-electron/*.pkg
        if-no-files-found: warn
