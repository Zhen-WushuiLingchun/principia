name: build

on:
  workflow_dispatch:
    inputs:
      release_tag:
        required: true
        type: string
      primary_version:
        required: true
        type: string
      is_test_mode:
        required: false
        default: false
        type: boolean

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux
          - os: ubuntu-latest
            platform: linux
            arch: x64
          - os: ubuntu-latest
            platform: linux
            arch: arm64

          # macOS
          - os: macos-15
            platform: macos
            arch: x64
          - os: macos-15
            platform: macos
            arch: arm64

          # Windows
          - os: windows-latest
            platform: windows
            arch: x64
          - os: windows-latest
            platform: windows
            arch: x86
          - os: windows-latest
            platform: windows
            arch: arm64

    steps:
      - uses: actions/checkout@v4

      # ==========================
      # Python 环境
      # ==========================
      - name: 设置 Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          architecture: ${{ matrix.arch == 'x86' && 'x86' || 'x64' }}

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          cd principia
          pip install -r requirements.txt
        shell: bash

      # ==========================
      # 【关键修复】跨架构打包Python（无QEMU、无报错）
      # ==========================
      - name: 构建 Python 后端
        run: |
          cd principia
          # Linux arm64 交叉编译
          if [ "${{ matrix.platform }}" = "linux" ] && [ "${{ matrix.arch }}" = "arm64" ]; then
            pyinstaller --onefile --name app app.py --distpath electron --target-arch aarch64
          # Windows arm64 交叉编译
          elif [ "${{ matrix.platform }}" = "windows" ] && [ "${{ matrix.arch }}" = "arm64" ]; then
            pyinstaller --onefile --name app app.py --distpath electron --target-arch arm64
          # macOS arm64 交叉编译
          elif [ "${{ matrix.platform }}" = "macos" ] && [ "${{ matrix.arch }}" = "arm64" ]; then
            pyinstaller --onefile --name app app.py --distpath electron --target-arch arm64
          # 普通 x64/x86
          else
            pyinstaller --onefile --name app app.py --distpath electron
          fi
        shell: bash

      # ==========================
      # Node.js + Electron
      # ==========================
      - name: 设置 Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 安装 Node 依赖
        run: cd principia && npm install
        shell: bash

      - name: 设置版本号
        run: |
          cd principia
          node -e "const fs=require('fs');const p=JSON.parse(fs.readFileSync('package.json'));p.version='${{ inputs.primary_version }}';fs.writeFileSync('package.json',JSON.stringify(p,null,2));"
        shell: bash

      - name: 构建前端
        run: cd principia && npm run build
        shell: bash

      # ==========================
      # 跨架构构建Electron
      # ==========================
      - name: 构建 Electron 应用
        run: |
          cd principia
          if [ "${{ matrix.platform }}" = "windows" ]; then
            if [ "${{ matrix.arch }}" = "x86" ]; then
              npm run electron:build -- --ia32
            else
              npm run electron:build -- --${{ matrix.arch }}
            fi
          else
            npm run electron:build -- --${{ matrix.arch }}
          fi
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ==========================
      # 上传1：解压文件夹
      # ==========================
      - name: 上传 解压文件夹
        uses: actions/upload-artifact@v4
        with:
          name: principia-${{ inputs.primary_version }}-${{ matrix.platform }}-${{ matrix.arch }}-unpacked
          path: principia/dist-electron/*-unpacked/**
          if-no-files-found: warn

      # ==========================
      # 上传2：安装包/可执行文件
      # ==========================
      - name: 上传 安装包
        uses: actions/upload-artifact@v4
        with:
          name: principia-${{ inputs.primary_version }}-${{ matrix.platform }}-${{ matrix.arch }}-executable
          path: |
            principia/dist-electron/*.exe
            principia/dist-electron/*.AppImage
            principia/dist-electron/*.dmg
            principia/dist-electron/*.app
            !principia/dist-electron/*-unpacked/
            !principia/dist-electron/*.yml
            !principia/dist-electron/*.blockmap
          if-no-files-found: warn

  release:
    needs: build  # 依赖build任务完成
    if: ${{ inputs.is_test_mode == false }}  # 仅非测试模式执行
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 拉取所有提交记录

      # 下载所有构建产物
      - name: 下载所有构建产物
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      # 生成Changelog（基于最近一次tag到当前的提交）
      - name: 生成 Changelog（github-changelog-generator 修复权限）
        id: generate_changelog
        run: |
          gem install github_changelog_generator --user-install
          export PATH=$HOME/.gem/ruby/*/bin:$PATH
          github_changelog_generator -u ${{ github.repository_owner }} -p ${{ github.event.repository.name }} --token ${{ secrets.GITHUB_TOKEN }}
          CHANGELOG=$(cat CHANGELOG.md)
          CHANGELOG="${CHANGELOG//'%'/'%25'}"
          CHANGELOG="${CHANGELOG//$'\n'/'%0A'}"
          CHANGELOG="${CHANGELOG//$'\r'/'%0D'}"
          echo "changelog=$CHANGELOG" >> $GITHUB_OUTPUT
      # 发布Release并上传产物
      - name: 发布 GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.release_tag }}
          name: Release v${{ inputs.primary_version }}
          body: ${{ steps.generate_changelog.outputs.changelog }}
          files: |
            artifacts/**/*
          draft: false  # 非草稿
          prerelease: false  # 非预发布
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
