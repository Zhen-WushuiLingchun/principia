name: 全平台全架构自动构建

on:
  workflow_dispatch:
    inputs:
      release_tag:
        required: true
        type: string
      primary_version:
        required: true
        type: string
      is_test_mode:
        required: false
        default: false
        type: boolean

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux
          - os: ubuntu-latest
            platform: linux
            arch: x64
          - os: ubuntu-24.04-arm64
            platform: linux
            arch: arm64

          # macOS
          - os: macos-13
            platform: macos
            arch: x64
          - os: macos-14
            platform: macos
            arch: arm64

          # Windows
          - os: windows-latest
            platform: windows
            arch: x64
          - os: windows-latest
            platform: windows
            arch: x86
          - os: windows-latest
            platform: windows
            arch: arm64

    steps:
      - uses: actions/checkout@v4

      # ARM64 需要 QEMU 模拟器
      - name: 安装 QEMU 模拟器
        if: matrix.arch == 'arm64'
        uses: docker/setup-qemu-action@v3

      # ==========================
      # Python 环境
      # ==========================
      - name: 设置 Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 安装 Python 依赖
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          cd principia
          pip install -r requirements.txt

      # ==========================
      # 打包 Python 后端
      # ==========================
      - name: 构建 Python 后端
        run: |
          cd principia
          pyinstaller --onefile --name app app.py --distpath electron
        shell: bash

      # ==========================
      # Node.js + Electron
      # ==========================
      - name: 设置 Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 安装 Node 依赖
        run: cd principia && npm install

      # 统一版本号
      - name: 设置版本号
        run: |
          cd principia
          node -e "const fs=require('fs');const p=JSON.parse(fs.readFileSync('package.json'));p.version='${{ inputs.primary_version }}';fs.writeFileSync('package.json',JSON.stringify(p,null,2));"
        shell: bash

      # 构建前端
      - name: 构建前端
        run: cd principia && npm run build

      # ==========================
      # 按架构构建 Electron
      # ==========================
      - name: 构建 Electron 应用
        run: |
          cd principia
          if [ "${{ matrix.platform }}" = "windows" ]; then
            if [ "${{ matrix.arch }}" = "x86" ]; then
              npm run electron:build -- --ia32
            elif [ "${{ matrix.arch }}" = "arm64" ]; then
              npm run electron:build -- --arm64
            else
              npm run electron:build -- --x64
            fi
          else
            npm run electron:build -- --${{ matrix.arch }}
          fi
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ==========================
      # 上传 1：未打包解压文件夹（用于调试）
      # ==========================
      - name: 上传【解压文件夹】
        uses: actions/upload-artifact@v4
        with:
          name: principia-${{ inputs.primary_version }}-${{ matrix.platform }}-${{ matrix.arch }}-unpacked
          path: principia/dist-electron/*-unpacked/
          if-no-files-found: warn

      # ==========================
      # 上传 2：可执行安装包（用于发布）
      # ==========================
      - name: 上传【安装包/可执行文件】
        uses: actions/upload-artifact@v4
        with:
          name: principia-${{ inputs.primary_version }}-${{ matrix.platform }}-${{ matrix.arch }}-executable
          path: |
            principia/dist-electron/*.exe
            principia/dist-electron/*.AppImage
            principia/dist-electron/*.dmg
            principia/dist-electron/*.app
            !principia/dist-electron/*-unpacked/
            !principia/dist-electron/*.yml
            !principia/dist-electron/*.blockmap
          if-no-files-found: warn