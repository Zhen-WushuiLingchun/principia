name: Build and Release
on:
  workflow_dispatch:
    inputs:
      release_tag:
        required: true
        type: string
        description: 发布标签-版本号(v1.X.X)
      release_version:
        required: true
        type: string
        description: 发布版本号(1.X.X)
      primary_version:
        required: true
        type: string
        description: 主版本号(1.X)
      is_test_mode:
        required: false
        default: false
        type: boolean
        description: 是否为测试模式
jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux
          - os: ubuntu-latest
            platform: linux
            arch: x64
          - os: ubuntu-latest
            platform: linux
            arch: arm64
          # macOS
          - os: macos-15
            platform: macos
            arch: x64
          - os: macos-15
            platform: macos
            arch: arm64
          # Windows
          - os: windows-latest
            platform: windows
            arch: x64
          - os: windows-latest
            platform: windows
            arch: x86
          - os: windows-latest
            platform: windows
            arch: arm64
    steps:
      - uses: actions/checkout@v4
      # ==========================
      # Python 环境（原逻辑不变）
      # ==========================
      - name: 设置 Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          architecture: ${{ matrix.arch == 'x86' && 'x86' || 'x64' }}
      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          cd principia
          pip install -r requirements.txt
        shell: bash
      # ==========================
      # 构建 Python 后端（原逻辑不变）
      # ==========================
      - name: 构建 Python 后端
        run: |
          cd principia
          # Linux arm64 交叉编译
          if [ "${{ matrix.platform }}" = "linux" ] && [ "${{ matrix.arch }}" = "arm64" ]; then
            pyinstaller --onefile --name app app.py --distpath electron --target-arch aarch64
          # Windows arm64 交叉编译
          elif [ "${{ matrix.platform }}" = "windows" ] && [ "${{ matrix.arch }}" = "arm64" ]; then
            pyinstaller --onefile --name app app.py --distpath electron --target-arch arm64
          # macOS arm64 交叉编译
          elif [ "${{ matrix.platform }}" = "macos" ] && [ "${{ matrix.arch }}" = "arm64" ]; then
            pyinstaller --onefile --name app app.py --distpath electron --target-arch arm64
          # 普通 x64/x86
          else
            pyinstaller --onefile --name app app.py --distpath electron
          fi
        shell: bash
      # ==========================
      # Node.js + Electron（原逻辑不变）
      # ==========================
      - name: 设置 Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: 安装 Node 依赖
        run: cd principia && npm install
        shell: bash
      - name: 设置版本号
        run: |
          cd principia
          node -e "const fs=require('fs');const p=JSON.parse(fs.readFileSync('package.json'));p.version='${{ inputs.release_version }}';fs.writeFileSync('package.json',JSON.stringify(p,null,2));"
        shell: bash
      - name: 构建前端
        run: cd principia && npm run build
        shell: bash
      # ==========================
      # 跨架构构建Electron（原逻辑不变）
      # ==========================
      - name: 构建 Electron 应用
        run: |
          cd principia
          if [ "${{ matrix.platform }}" = "windows" ]; then
            if [ "${{ matrix.arch }}" = "x86" ]; then
              npm run electron:build -- --ia32
            else
              npm run electron:build -- --${{ matrix.arch }}
            fi
          else
            npm run electron:build -- --${{ matrix.arch }}
          fi
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      # ==========================
      # 压缩未打包文件夹（原逻辑完全保留，无任何修改）
      # ==========================
      - name: 压缩未打包文件夹
        run: |
          cd principia/dist-electron
          if ls *-unpacked 1> /dev/null 2>&1; then
            tar -czf ../principia-${{ inputs.release_version }}-${{ matrix.platform }}-${{ matrix.arch }}-unpacked.tar.gz *-unpacked/**
          else
            echo "::warning::未找到未打包文件夹，跳过压缩"
          fi
        shell: bash

      - name: 压缩可执行文件/安装包
        run: |
          set -euo pipefail
          TARGET_DIR="principia/dist-electron"
          # 目录不存在直接跳过
          if [ ! -d "$TARGET_DIR" ]; then
            echo "::warning::目录 $TARGET_DIR 不存在，跳过可执行文件压缩"
            exit 0
          fi
          cd "$TARGET_DIR"
    
          # 定义文件匹配规则（复用变量，避免重复写）
          FILE_PATTERNS="( -name *.exe -o -name *.AppImage -o -name *.dmg -o -name *.app )"
          EXCLUDE_PATTERNS="-not -name 'Principia Setup *.exe' -not -name *.deb -not -name *.pkg -not -name *.yml -not -name *.blockmap"
    
          # 判断是否有文件
          if find . -maxdepth 1 -type f $FILE_PATTERNS $EXCLUDE_PATTERNS -print0 | grep -qz .; then
            # 核心修复：用 -exec tar 直接打包，去掉路径前缀，文件名干净无 .\
            find . -maxdepth 1 -type f $FILE_PATTERNS $EXCLUDE_PATTERNS \
              -exec tar -C "$TARGET_DIR" -czf "../principia-${{ inputs.release_version }}-${{ matrix.platform }}-${{ matrix.arch }}-executable.tar.gz" {} +
      
            echo "✅ 可执行文件压缩完成（文件名无路径前缀）"
      
            # 打印打包的文件列表
            echo "🔍 打包的文件："
            find . -maxdepth 1 -type f $FILE_PATTERNS $EXCLUDE_PATTERNS
          else
            echo "::warning::❌ 在 $TARGET_DIR 未找到可执行文件/安装包，跳过压缩"
            echo "📂 目录下现有文件："
            ls -la
          fi
        shell: bash


      # ==========================
      # 上传1：unpacked压缩包（原逻辑不变）
      # ==========================
      - name: 上传 解压文件夹
        uses: actions/upload-artifact@v4
        with:
          name: principia-${{ inputs.release_version }}-${{ matrix.platform }}-${{ matrix.arch }}-unpacked
          path: principia/principia-${{ inputs.release_version }}-${{ matrix.platform }}-${{ matrix.arch }}-unpacked.tar.gz
          if-no-files-found: warn
      # ==========================
      # 上传2：可执行文件压缩包（原新增逻辑不变）
      # ==========================
      - name: 上传 可执行文件压缩包
        uses: actions/upload-artifact@v4
        with:
          name: principia-${{ inputs.release_version }}-${{ matrix.platform }}-${{ matrix.arch }}-executable
          path: principia/principia-${{ inputs.release_version }}-${{ matrix.platform }}-${{ matrix.arch }}-executable.tar.gz
          if-no-files-found: warn
  release:
    needs: build
    if: ${{ inputs.is_test_mode == false }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: 读取 ChangeLog
        id: changelog
        run: |
          body=$(cat doc/Changelogs/${{ inputs.primary_version }}/${{ inputs.release_version }}/App.md)
          echo "body<<EOF" >> $GITHUB_OUTPUT
          echo "$body" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
        shell: bash
      - name: 下载所有构建产物
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: 发布 GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.release_tag }}
          name: Release v${{ inputs.release_version }}
          body: ${{ steps.changelog.outputs.body }}
          files: |
            artifacts/**/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
